<!DOCTYPE html>
<html>
<head><title>Logo Helper</title></head>
<body>
<p id="status">Loading logo...</p>
<script>
(async () => {
  const status = document.getElementById('status');
  try {
    status.textContent = 'Fetching logo_1024.png...';
    const resp = await fetch('./logo_1024.png');
    const blob = await resp.blob();
    status.textContent = 'Read blob: ' + blob.size + ' bytes. Converting to base64...';
    const reader = new FileReader();
    reader.onload = function() {
      const b64 = reader.result.split(',')[1];
      status.textContent = 'Sending ' + b64.length + ' chars to opener...';
      if (window.opener) {
        window.opener.postMessage(
          {type: 'logoData', b64: b64, size: blob.size},
          'https://developers.tiktok.com'
        );
        status.textContent = 'Sent! ' + b64.length + ' chars. You can close this window.';
      } else {
        status.textContent = 'Error: no window.opener';
      }
    };
    reader.onerror = function(e) {
      status.textContent = 'FileReader error: ' + e;
    };
    reader.readAsDataURL(blob);
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    if (window.opener) {
      window.opener.postMessage(
        {type: 'error', msg: e.message},
        'https://developers.tiktok.com'
      );
    }
  }
})();
</script>
</body>
</html>
