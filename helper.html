<!DOCTYPE html>
<html>
<head><title>Logo Helper</title></head>
<body>
<p id="status">Loading...</p>
<script>
(async () => {
  const status = document.getElementById('status');
  try {
    status.textContent = 'Fetching logo_1024.png...';
    const resp = await fetch('./logo_1024.png');
    const blob = await resp.blob();
    status.textContent = 'Read blob: ' + blob.size + ' bytes. Converting...';
    const reader = new FileReader();
    reader.onload = function() {
      const b64 = reader.result.split(',')[1];
      try {
        localStorage.setItem('logoB64', b64);
        localStorage.setItem('logoSize', String(blob.size));
        status.textContent = 'DONE: stored ' + b64.length + ' chars in localStorage. Size: ' + blob.size;
        document.title = 'DONE';
      } catch(e) {
        status.textContent = 'localStorage error: ' + e.message;
        document.title = 'ERROR';
      }
    };
    reader.onerror = function(e) {
      status.textContent = 'FileReader error';
      document.title = 'ERROR';
    };
    reader.readAsDataURL(blob);
  } catch(e) {
    status.textContent = 'Fetch error: ' + e.message;
    document.title = 'ERROR';
  }
})();
</script>
</body>
</html>
